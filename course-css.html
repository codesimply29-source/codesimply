<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <title>كورس CSS | CodeSimply</title>

    <link rel="stylesheet" href="css/course-css.css">
</head>

<body>

    <!-- Navbar -->

    <nav class="navbar">

        <div class="logo">
            <h2>codesimply</h2>
        </div>

    <div class="course-page">

        <!-- الفيديو -->

        <div class="video-section">

            <div class="course-top">

                <h1 id="courseTitle">

                </h1>

                <div class="course-progress-text">
                    <span id="progressNum">0%</span>

                    <div class="progress-bar" id="progressBar">

            </div>

        <div class="playlist">

            <button class="lesson">

            <button class="lesson">

                <small>20 دقيقة</small>
            </button>

            <button class="lesson">
