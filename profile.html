<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>الملف الشخصي | CodeSimply</title>

    <link rel="stylesheet" href="css/profile.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="container">

        <div class="profile-card">

            <img src="https://i.imgur.com/HeIi0wU.png" class="avatar" alt="Avatar">

            <h1>الملف الشخصي</h1>

            <div class="line"></div>

            <div class="welcome">

                <h3>🎉 مرحباً بك</h3>

                <p>تم تسجيل الدخول بنجاح</p>

            </div>

            <!-- بيانات المستخدم -->
            <div class="user-info">

                <p><strong>الاسم:</strong> <span id="name">...</span></p>

                <p><strong>البريد الإلكتروني:</strong> <span id="email">...</span></p>

            </div>

            <button id="homeBtn" class="home-btn" onclick="goHome()">
                🏠 الصفحة الرئيسية
            </button>

            <button id="logout">
                تسجيل الخروج
            </button>

        </div>

    </div>

    <script src="js/profile.js"></script>

</body>

</html>
