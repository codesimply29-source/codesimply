<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>codesimply</title>

    <link rel="stylesheet" href="css/contact.css">
    <link rel="icon" href="images/favicon.ico.png">
</head>

<body>
<section class="contact">
    <div class="container">

        <h1>تواصل معنا</h1>

        <p>
            إذا كان لديك أي استفسار أو اقتراح أو واجهت أي مشكلة أثناء استخدام
            المنصة، فلا تتردد في التواصل معنا.
        </p>

        <div class="contact-info">
            <p><strong>البريد الإلكتروني:</strong> example@email.com</p>

            <p><strong>رقم الهاتف:</strong> 01000000000</p>

            <p><strong>العنوان:</strong> القاهرة - مصر</p>

            <p><strong>ساعات العمل:</strong> من 9 صباحًا حتى 9 مساءً</p>
        </div>

        <form>

            <input type="text" placeholder="الاسم بالكامل" required>

            <input type="email" placeholder="البريد الإلكتروني" required>

            <input type="text" placeholder="عنوان الرسالة">

            <textarea rows="6" placeholder="اكتب رسالتك هنا"></textarea>

            <button type="submit">
                إرسال الرسالة
            </button>

        </form>

    </div>
</section>
